name: Deck feedback
description: Tell us what you found, what surprised you, or what didn't work — from any slide or any reader view.
title: "[feedback] "
labels: ["feedback", "deck"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for spending time with the deck. We re-read every issue and most of them shape the next iteration. There are no wrong answers; brief is fine; in any language is fine.

  - type: input
    id: deck_version
    attributes:
      label: Deck version
      description: Auto-filled from the footer (`v2.0.0 · 2026-05-17`) if you opened this issue from the deck. Otherwise check the deck footer for the current version.
      placeholder: e.g. v2.0.0
    validations:
      required: false

  - type: input
    id: slide_anchor
    attributes:
      label: Which slide / anchor?
      description: If the feedback is about a specific slide, paste the anchor (e.g. `#layer-02-capabilities`, `#visitor-ladder`, `#substrate`). Leave blank for general feedback.
      placeholder: e.g. #layer-02-capabilities
    validations:
      required: false

  - type: dropdown
    id: reader_view
    attributes:
      label: Which entry view did you use?
      description: From the cover-slide entry router. "I just scrolled" is a valid answer.
      options:
        - "Read in order (default scroll)"
        - "Executive view"
        - "Staff view"
        - "Board view"
        - "Engineer view (/spec/)"
        - "Calibration lead view"
        - "I just scrolled / didn't use the router"
        - "Other"
    validations:
      required: false

  - type: dropdown
    id: language_mode
    attributes:
      label: Which language toggle were you using?
      options:
        - "All (trilingual default)"
        - "TC (Traditional Chinese)"
        - "EN (English)"
        - "JP (Japanese)"
    validations:
      required: false

  - type: textarea
    id: what_worked
    attributes:
      label: What worked for you?
      description: A specific slide, a specific sentence, a specific moment. Be terse if you like.
    validations:
      required: false

  - type: textarea
    id: what_didnt
    attributes:
      label: What didn't work?
      description: Be specific. "It felt long" is useful; "Slide 11 felt long" is more useful; "Slide 11's BARS exemplar tabs are confusing" is most useful.
    validations:
      required: false

  - type: textarea
    id: what_missing
    attributes:
      label: What was missing?
      description: What did you wish was there but wasn't? (Yuki #7's answer would have been "I wished you'd told me to expect the next-day card.")
    validations:
      required: false

  - type: input
    id: persona
    attributes:
      label: If you fit a persona, which one?
      description: 10-persona panel labels are fine if you've seen them. Otherwise free text — "I'm a museum docent in Kyoto" is great.
      placeholder: e.g. "L4 designer at HQ-TW" / "museum board member" / "first-time visitor"
    validations:
      required: false

  - type: checkboxes
    id: contact_okay
    attributes:
      label: May we follow up?
      description: Optional. Check if you're okay with us asking clarifying questions on this issue.
      options:
        - label: Yes, follow up is welcome
          required: false
        - label: I'd prefer this as one-shot feedback
          required: false
